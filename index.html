<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A2B5C">
  <title>HomeHunt</title>
  <link rel="stylesheet" href="styles.css">

  <!-- OneSignal Web SDK -->
     <!-- OneSignal Web SDK -->
     <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
     <script>
       window.OneSignalDeferred = window.OneSignalDeferred || [];
       OneSignalDeferred.push(async function(OneSignal) {
         await OneSignal.init({
           appId: "879ec9f0-991d-43c8-9227-26d2033ca4eb",
           allowLocalhostAsSecureOrigin: true,
           notifyButton: { enable: false },
           serviceWorkerParam: { scope: "/homehunt/" },
           serviceWorkerPath: "OneSignalSDKWorker.js"
         });
       });
     </script>
</head>
<body>

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="login-screen" class="screen">
    <div class="login-container">
      <h1>HomeHunt</h1>
      <p class="subtitle">Our private property search</p>
      
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" id="login-button">Log In</button>
      </form>
      
      <p id="login-error" class="error-message hidden"></p>
    </div>
  </div>

  <!-- ============ MAIN APP SCREEN ============ -->
  <div id="app-screen" class="screen hidden">
    
    <!-- Top bar -->
    <header class="top-bar">
         <h2 id="top-bar-title">Properties</h2>
         <div class="top-bar-actions">
           <button id="notifications-button" class="text-button">🔔 Off</button>
           <button id="logout-button" class="text-button">Log out</button>
         </div>
       </header>

    <!-- Properties list -->
    <main id="properties-list" class="properties-list">
      <p class="empty-state">Loading…</p>
    </main>
    
<!-- Bottom tab bar -->
    <nav class="tab-bar">
      <button class="tab-button active" data-tab="properties">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Properties</span>
      </button>
      <button class="tab-button" data-tab="calendar">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Calendar</span>
      </button>
    </nav>

    <!-- ============ CALENDAR SCREEN ============ -->
    <section id="calendar-section" class="hidden">
      <div class="calendar-header">
        <button id="cal-prev" class="cal-nav-button">‹</button>
        <h3 id="cal-month-label">Month Year</h3>
        <button id="cal-next" class="cal-nav-button">›</button>
      </div>
      <div class="calendar-weekdays">
        <span>Mon</span><span>Tue</span><span>Wed</span>
        <span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div id="calendar-day-details" class="calendar-day-details"></div>
    </section>

    <!-- Floating Add button -->
    <button id="add-property-button" class="fab">+</button>

    <!-- Add Property Modal -->
    <div id="add-property-modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title">Add Property</h3>

        <!-- URL auto-fetch section -->
        <div id="url-fetch-section" class="url-fetch-section">
          <label>Fetch from listing URL (Rightmove / Zoopla)</label>
          <div class="url-fetch-row">
            <input type="url" id="fetch-url-input" placeholder="Paste Rightmove or Zoopla URL…">
            <button type="button" id="fetch-url-button" class="fetch-button">Fetch</button>
          </div>
          <p id="fetch-status" class="fetch-status hidden"></p>
        </div>
        <form id="add-property-form">
          <label>Address *</label>
          <input type="text" id="property-address" placeholder="e.g. 14 Oak Street, Bristol BS1 4AB" required>
          
          <label>Nickname (optional)</label>
          <input type="text" id="property-nickname" placeholder="e.g. The blue door one">
          <label>Bedrooms (optional)</label>
          <input type="number" id="property-bedrooms" placeholder="e.g. 2" min="0" step="1">
          
          <label>Status</label>
          <select id="property-status">
            <option value="saved">Saved</option>
            <option value="viewing_booked">Viewing Booked</option>
            <option value="viewed">Viewed</option>
            <option value="shortlisted">Shortlisted</option>
            <option value="rejected">Rejected</option>
          </select>
          
          <label>Viewing date & time (optional)</label>
          <input type="datetime-local" id="property-viewing-date">
          
          <label>Listing URL (optional)</label>
          <input type="url" id="property-listing-url" placeholder="https://rightmove.co.uk/...">
          
          <label>Monthly rent £ (optional)</label>
          <input type="number" id="property-rent" placeholder="e.g. 1400" step="50">
          
          <label>Notes (optional)</label>
          <textarea id="property-notes" rows="3" placeholder="First impressions, concerns, things to ask..."></textarea>
          
          <div class="modal-buttons">
            <button type="button" id="delete-property-button" class="danger-button hidden">Delete</button>
            <button type="button" id="cancel-add-button" class="secondary-button">Cancel</button>
            <button type="submit" id="save-property-button" class="primary-button">Save</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <!-- Supabase library, loaded before our app code -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
